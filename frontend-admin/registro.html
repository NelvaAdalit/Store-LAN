<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Admin - STORE LAN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Simulación de esferas doradas y vino en 3D del fondo -->
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Tarjeta Glassmorphism -->
    <div class="login-glass">
        <h2>REGISTRO STORE LAN</h2>
        
        <form id="registerForm">
            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" required placeholder="correo@example.com">
            </div>
            
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="Mínimo 6 caracteres">
            </div>

            <div class="input-group">
                <label for="confirmPassword">Confirmar Contraseña</label>
                <input type="password" id="confirmPassword" required placeholder="Repite tu contraseña">
            </div>
            
            <div class="options" style="justify-content: center; margin-bottom: 25px;">
                <a href="index.html" class="forgot">¿Ya tienes una cuenta? Inicia sesión aquí</a>
            </div>
            
            <button type="submit">REGISTRARSE</button>
        </form>
        
        <p id="mensaje"></p>
    </div>

    <script src="registro.js"></script>
</body>
</html>
